spring.application.name=travel-booking-backend
server.port=8080

spring.security.user.name=${DEFAULT_SECURITY_USERNAME}
spring.security.user.password=${DEFAULT_SECURITY_PASSWORD}

jwt.secret=mysupersecureroughandtoughsecretkey
jwt.expiration=3600000
jwt.refresh-token.expiration=604800

spring.datasource.url=jdbc:postgresql://localhost:5432/travel_booking_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect